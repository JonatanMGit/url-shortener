services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    restart: unless-stopped

  app1: &app_base
    build:
      context: ../../../
      dockerfile: Dockerfile
    environment:
      FLASK_DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_NAME: ${DATABASE_NAME:-hackathon_db}
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-300}
      REDIS_CACHE_KEY_PREFIX: ${REDIS_CACHE_KEY_PREFIX:-url-shortener}
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "flask",
        "--app",
        "app",
        "run",
        "--host",
        "0.0.0.0",
        "--port",
        "5060",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5060/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 8
    restart: unless-stopped

  app2:
    <<: *app_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      app1:
        condition: service_healthy

  app3:
    <<: *app_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      app2:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ../../../production/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy
    ports:
      - "5000:80"
    restart: unless-stopped
