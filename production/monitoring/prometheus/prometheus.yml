global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: url-shortener-app
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - app1:5060
          - app2:5060
          - app3:5060

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
